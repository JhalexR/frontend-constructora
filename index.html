<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constructora el Progreso by Camily Hermosilla</title>
  </head>

  <body>
    <section class="fondo-principal">
      <!--Sección bienvenida-->
      <h1 class="titulo">Constructora El Progreso by Camily Hermosilla</h1>
      <img
        src="https://media1.amarilo.com.co/website/s3fs-public/2023-08/El-cambio-es-Amarilo-1-1170x686.jpg"
        alt=""
      />
      <nav class="nav">
        <!--Navbar-->
        <ul class="menu">
          <!--Menu de navegacion-->
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Proyectos</a></li>
          <li><a href="#">Contacto</a></li>
        </ul>
      </nav>
    </section>

    <h2 class="titulo-proyectos">Proyectos</h2>
    <span> </span>
    <section class="edificios">
      <!--Sección de edificios-->
      <div class="edificio-1">
        <h2>Edificio Central</h2>
        <img
          src="https://i.pinimg.com/originals/b4/ee/e2/b4eee26494fae2af4e37dbad9ec2082c.jpg"
          alt=""
        />
      </div>

      <div class="edificio-2">
        <h2>Conjunto Residencial</h2>
        <img
          src="https://media1.amarilo.com.co/website/s3fs-public/blog/2023-03/Conjunto-Residencial-Lago-Alto.-Barranquilla.jpg"
          alt=""
        />
      </div>

      <div class="edificio-3">
        <h2>Centro Comercial</h2>
        <img
          src="https://d2yoo3qu6vrk5d.cloudfront.net/pulzo-lite/images-resized/PP4315133-h-o.webp"
          alt=""
        />
      </div>
    </section>

    <h2 class="titulo-proyectoventa">Proyectos en venta</h2>
    <!--Sección de Proyectos en Venta-->
    <section class="section-proyectoventa">
      <div class="edificio-1">
        <h2>Edificio Central</h2>
        <img
          src="https://i.pinimg.com/originals/b4/ee/e2/b4eee26494fae2af4e37dbad9ec2082c.jpg"
          alt=""
        />
        <p>Precio: 1.000.000</p>
      </div>

      <div class="edificio-2">
        <h2>Conjunto Residencial</h2>
        <img
          src="https://media1.amarilo.com.co/website/s3fs-public/blog/2023-03/Conjunto-Residencial-Lago-Alto.-Barranquilla.jpg"
          alt=""
        />
        <p>Precio: 80.000</p>
      </div>
    </section>
    <section class="section-formulario">
      <!--Sección de Formulario-->
      <form action="" class="formulario">
        <h2 class="titulo-formulario">Contáctanos</h2>

        <label for="name">
          Nombre: <input type="text" id="name" name="user_name" />
        </label>

        <label for="nombre">Email: <input type="email" /></label>

        <label for="comentario"
          >Comentario:
          <input
            type=" "
            id="comentario"
            name="comentario"
            rows="4"
            cols="50"
            placeholder="Escribe aquí..."
          />
        </label>

        <button class="boton-formulario">Enviar</button>
      </form>
    </section>
  </body>
</html>
